<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A letter for you</title>

<!--
  ════════════════════════════════════════════════════════════════════
   YOU DON'T EDIT THIS FILE — edit config.js (her name, message,
   memories, hourly notes, Firebase config all live there).

   THREE FILES, keep them together when you deploy:
     • config.js   ← you edit this
     • index.html  ← her card (this file)
     • sign.html   ← the link you send her friends

   TO SEND IT: drop all three onto vercel.com.
     - Her card is the main link.
     - The friends' link is  yoursite.vercel.app/sign.html
   Mic-blow + the shared guestbook need the https link, not a local file.
  ════════════════════════════════════════════════════════════════════
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>

<style>
  :root{
    --night-deep:#160f2e; --night:#241a45; --horizon:#5c3f76;
    --star:#fdf4e3; --star-gold:#ffd79a;
    --her-rose:#f4a6c4; --her-rose-soft:#f7c2d8;
    --text-cream:#f6eee1; --text-soft:#cbbce4; --text-faint:#9d8fc0;
    --panel:rgba(40,28,74,.55); --panel-line:rgba(244,166,196,.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Mulish',system-ui,sans-serif;
    background:radial-gradient(140% 110% at 50% 4%, #3a2a5e 0%, var(--night) 32%, var(--night-deep) 70%, #0d0820 100%) fixed;
    color:var(--text-cream); min-height:100vh; overflow-x:hidden; position:relative;
  }
  body::after{content:"";position:fixed;left:50%;bottom:-30vh;width:140vw;height:60vh;
    transform:translateX(-50%);
    background:radial-gradient(50% 100% at 50% 100%, rgba(244,166,196,.16), rgba(92,63,118,.06) 45%, transparent 70%);
    pointer-events:none;z-index:0;}

  #starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .twinkle{position:absolute;border-radius:50%;background:var(--star);opacity:0;
    animation:twinkle var(--dur,4s) ease-in-out var(--delay,0s) infinite;
    box-shadow:0 0 6px rgba(253,244,227,.8);}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.8);}50%{opacity:.95;transform:scale(1.15);}}

  #fx{position:fixed;inset:0;z-index:30;pointer-events:none;}

  .wrap{position:relative;z-index:2;width:min(94vw,600px);margin:0 auto;padding:0 24px 90px;text-align:center;}

  .sealed{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:26px;animation:floatIn 1.1s cubic-bezier(.2,.7,.2,1) both;}
  .seal-mark{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--star-gold);line-height:1;
    animation:breathe 4.5s ease-in-out infinite;text-shadow:0 0 24px rgba(255,215,154,.45);}
  .eyebrow{font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--text-faint);font-weight:500;}
  .lede{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(26px,6vw,34px);
    color:var(--text-cream);font-weight:400;line-height:1.3;max-width:18ch;}
  .btn-gold{font-family:'Mulish',sans-serif;font-size:14px;letter-spacing:.18em;text-transform:uppercase;
    font-weight:600;color:var(--night-deep);background:linear-gradient(180deg,#ffe6b8,var(--star-gold));
    border:none;border-radius:999px;padding:15px 38px;cursor:pointer;transition:transform .3s ease;}
  .btn-gold:focus-visible{outline:2px solid var(--her-rose-soft);outline-offset:4px;}
  .btn-gold:hover{transform:translateY(-2px) scale(1.03);}
  #openBtn{animation:pulse 3s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,154,.45);}50%{box-shadow:0 0 0 16px rgba(255,215,154,0);}}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.92;}50%{transform:scale(1.08);opacity:1;}}
  @keyframes floatIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  .letter{display:none;padding-top:14vh;}
  .letter.show{display:block;}
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1);}
  .reveal.in{opacity:1;transform:none;}

  .top-eyebrow{margin-bottom:8px;}
  .greeting{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(32px,8vw,50px);line-height:1.05;color:var(--text-cream);}
  .her-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:clamp(42px,12vw,72px);
    line-height:1.05;color:var(--her-rose);text-shadow:0 0 30px rgba(244,166,196,.35);margin-top:2px;}

  .section{margin-top:64px;}
  .label-sm{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-faint);font-weight:600;margin-bottom:18px;}

  .constellation-wrap{max-width:380px;margin:24px auto 0;}
  #constellation{width:100%;height:auto;overflow:visible;}
  .c-line{fill:none;stroke:rgba(253,244,227,.5);stroke-width:1.1;stroke-linecap:round;stroke-dasharray:600;stroke-dashoffset:600;}
  .letter.show .c-line{animation:draw 2.4s ease .5s forwards;}
  @keyframes draw{to{stroke-dashoffset:0;}}
  .c-star{cursor:pointer;}
  .c-star circle{fill:var(--star);}
  .c-star.her circle{fill:var(--her-rose);}
  .c-star .halo{fill:rgba(253,244,227,.18);opacity:0;transition:opacity .25s;}
  .c-star.her .halo{fill:rgba(244,166,196,.22);}
  .c-star:hover .halo,.c-star.active .halo{opacity:1;}
  .c-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text-soft);opacity:.85;margin-top:14px;}

  .memory-panel{max-width:34ch;margin:18px auto 0;overflow:hidden;max-height:0;opacity:0;
    transition:max-height .5s ease, opacity .5s ease;}
  .memory-panel.open{max-height:260px;opacity:1;}
  .memory-card{background:var(--panel);border:1px solid var(--panel-line);border-radius:16px;padding:20px 22px;backdrop-filter:blur(6px);}
  .memory-card .when{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--her-rose-soft);font-weight:600;margin-bottom:8px;}
  .memory-card .what{font-family:'Cormorant Garamond',serif;font-size:21px;line-height:1.5;color:var(--text-cream);}

  .message{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(20px,4.6vw,24px);line-height:1.65;
    color:var(--text-cream);max-width:34ch;margin:0 auto;}
  .message p{margin-bottom:1em;}
  .message p:last-child{margin-bottom:0;}

  .notes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;max-width:460px;margin:0 auto;}
  .locket{background:var(--panel);border:1px solid var(--panel-line);border-radius:14px;padding:18px 14px;cursor:pointer;
    transition:transform .25s ease, border-color .25s ease;position:relative;min-height:96px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;backdrop-filter:blur(6px);}
  .locket.locked{cursor:default;opacity:.7;}
  .locket.unlocked:hover{transform:translateY(-3px);border-color:rgba(244,166,196,.6);}
  .locket .ic{font-size:22px;color:var(--star-gold);}
  .locket.locked .ic{color:var(--text-faint);}
  .locket .cap{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);font-weight:600;}
  .locket .count{font-size:12px;color:var(--text-soft);font-variant-numeric:tabular-nums;}
  .locket .peek{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text-cream);line-height:1.35;display:none;}
  .locket.opened .ic,.locket.opened .cap{display:none;}
  .locket.opened .peek{display:block;}

  .candle{position:relative;width:54px;height:120px;margin:0 auto;}
  .flame{position:absolute;left:50%;top:-30px;width:18px;height:34px;transform:translateX(-50%);
    background:radial-gradient(circle at 50% 70%, #fff6cf 0%, #ffd479 38%, #ff9d3c 70%, rgba(255,120,40,0) 78%);
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;filter:blur(.4px);transform-origin:50% 100%;
    animation:flick .18s ease-in-out infinite alternate;box-shadow:0 -10px 40px 6px rgba(255,180,80,.5);cursor:pointer;}
  .flame::after{content:"";position:absolute;left:50%;top:8px;width:8px;height:16px;transform:translateX(-50%);
    background:radial-gradient(circle,#bfe0ff 0%, rgba(120,170,255,0) 70%);border-radius:50%;}
  .flame.out{animation:none;opacity:0;transform:translateX(-50%) scaleY(0);transition:all .5s ease;}
  @keyframes flick{from{transform:translateX(-50%) rotate(-3deg) scaleY(1);}to{transform:translateX(-51%) rotate(3deg) scaleY(1.08);}}
  .wax{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30px;height:96px;border-radius:8px 8px 4px 4px;
    background:linear-gradient(180deg,#f7c2d8,#d4799c);box-shadow:inset -6px 0 10px rgba(0,0,0,.2);}
  .wick{position:absolute;left:50%;top:-2px;transform:translateX(-50%);width:2px;height:8px;background:#3a2a2a;}
  .smoke{position:absolute;left:50%;top:-30px;width:6px;height:6px;transform:translateX(-50%);border-radius:50%;background:rgba(220,220,235,.5);opacity:0;}
  .smoke.go{animation:smoke 1.6s ease-out forwards;}
  @keyframes smoke{0%{opacity:.6;transform:translate(-50%,0) scale(1);}100%{opacity:0;transform:translate(-50%,-70px) scale(2.4);}}
  .blow-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--text-soft);margin-top:22px;}
  .mic-btn{margin-top:14px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--text-soft);
    background:transparent;border:1px solid var(--panel-line);border-radius:999px;padding:9px 18px;cursor:pointer;transition:.2s;}
  .mic-btn:hover{border-color:var(--her-rose);color:var(--text-cream);}
  .finale-line{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,5.5vw,30px);color:var(--her-rose);
    text-shadow:0 0 24px rgba(244,166,196,.4);margin-top:30px;opacity:0;transform:translateY(14px);transition:.9s ease;}
  .finale-line.in{opacity:1;transform:none;}

  /* friends button + count */
  .friends-btn{animation:none;}
  .friends-count{font-size:13px;color:var(--text-soft);margin-top:14px;font-style:italic;font-family:'Cormorant Garamond',serif;}

  /* friends overlay */
  .friends-overlay{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
    background:radial-gradient(120% 90% at 50% 0%, rgba(58,42,94,.96), rgba(13,8,32,.985));backdrop-filter:blur(3px);}
  .friends-overlay.show{display:flex;animation:foIn .5s ease;}
  @keyframes foIn{from{opacity:0;}to{opacity:1;}}
  .fo-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 14px;flex:0 0 auto;}
  .fo-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,5vw,26px);color:var(--text-cream);}
  .fo-close{width:40px;height:40px;border-radius:50%;background:var(--panel);border:1px solid var(--panel-line);
    color:var(--text-cream);font-size:20px;cursor:pointer;line-height:1;transition:.2s;}
  .fo-close:hover{border-color:var(--her-rose);}
  .fo-scroll{flex:1 1 auto;overflow-y:auto;padding:10px 18px 60px;column-width:230px;column-gap:16px;}
  .fo-empty{color:var(--text-soft);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;text-align:center;margin-top:18vh;}
  .float-note{break-inside:avoid;width:100%;display:inline-block;margin:0 0 16px;background:var(--panel);
    border:1px solid var(--panel-line);border-radius:16px;padding:16px 18px;text-align:left;backdrop-filter:blur(6px);
    opacity:0;animation:noteIn .7s ease forwards, bob var(--bd,6s) ease-in-out infinite;
    animation-delay:var(--delay,0s), calc(var(--delay,0s) + .7s);}
  @keyframes noteIn{from{opacity:0;transform:translateY(22px) scale(.97);}to{opacity:1;transform:none;}}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(var(--r,0deg));}50%{transform:translateY(-9px) rotate(calc(var(--r,0deg) * -1));}}
  .float-note .fn-from{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--her-rose-soft);margin-bottom:5px;}
  .float-note .fn-msg{font-size:15px;line-height:1.55;color:var(--text-cream);}

  .divider{width:46px;height:1px;margin:54px auto 22px;background:linear-gradient(90deg,transparent,rgba(244,166,196,.7),transparent);}
  .signature{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,5vw,28px);color:var(--text-cream);}
  .meta{margin-top:8px;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--text-faint);font-weight:500;}

  .music-toggle{position:fixed;top:16px;right:16px;z-index:40;width:42px;height:42px;border-radius:50%;
    background:var(--panel);border:1px solid var(--panel-line);color:var(--text-cream);cursor:pointer;display:none;
    align-items:center;justify-content:center;font-size:18px;backdrop-filter:blur(6px);transition:.2s;}
  .music-toggle:hover{border-color:var(--her-rose);}
  .music-toggle.show{display:flex;}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;animation-delay:0s !important;}
    .reveal{opacity:1;transform:none;}
    .c-line{stroke-dashoffset:0;}
    .float-note{opacity:1;}
  }
</style>
</head>
<body>

<div id="starfield" aria-hidden="true"></div>
<canvas id="fx" aria-hidden="true"></canvas>
<button class="music-toggle" id="musicToggle" aria-label="Toggle music">♪</button>

<main class="wrap">

  <section class="sealed" id="sealed">
    <div class="seal-mark" aria-hidden="true">✦</div>
    <p class="eyebrow">a little something</p>
    <p class="lede">There's a letter here, waiting just for you.</p>
    <button class="btn-gold" id="openBtn">Open it</button>
  </section>

  <section class="letter" id="letter" aria-live="polite">

    <p class="eyebrow top-eyebrow reveal" id="rvEyebrow">Happy birthday</p>
    <h1 class="greeting reveal" id="rvGreeting"></h1>
    <div class="her-name reveal" id="rvName"></div>

    <div class="section">
      <div class="constellation-wrap reveal" id="rvConst">
        <svg id="constellation" viewBox="0 0 360 160" role="img" aria-label="A constellation of memories">
          <polyline class="c-line" points="36,128 92,76 150,104 212,44 272,92 330,58"/>
          <g class="c-star" data-i="0" tabindex="0" role="button" aria-label="A memory"><circle class="halo" cx="36"  cy="128" r="14"/><circle cx="36"  cy="128" r="3"/></g>
          <g class="c-star" data-i="1" tabindex="0" role="button" aria-label="A memory"><circle class="halo" cx="92"  cy="76"  r="14"/><circle cx="92"  cy="76"  r="2.6"/></g>
          <g class="c-star" data-i="2" tabindex="0" role="button" aria-label="A memory"><circle class="halo" cx="150" cy="104" r="14"/><circle cx="150" cy="104" r="3.2"/></g>
          <g class="c-star her" data-i="3" tabindex="0" role="button" aria-label="Her star"><circle class="halo" cx="212" cy="44" r="18"/><circle cx="212" cy="44" r="6"/></g>
          <g class="c-star" data-i="4" tabindex="0" role="button" aria-label="A memory"><circle class="halo" cx="272" cy="92"  r="14"/><circle cx="272" cy="92"  r="2.6"/></g>
          <g class="c-star" data-i="5" tabindex="0" role="button" aria-label="A memory"><circle class="halo" cx="330" cy="58"  r="14"/><circle cx="330" cy="58"  r="3.4"/></g>
        </svg>
        <p class="c-hint">Each star holds a memory — tap one ✦</p>
      </div>
      <div class="memory-panel" id="memoryPanel">
        <div class="memory-card">
          <div class="when" id="memWhen"></div>
          <div class="what" id="memWhat"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="message reveal" id="rvMessage"></div>
    </div>

    <div class="section reveal" id="rvNotes">
      <p class="label-sm">Letters through the day</p>
      <div class="notes-grid" id="notesGrid"></div>
    </div>

    <div class="section reveal" id="rvCandle">
      <p class="label-sm">Make your wish</p>
      <div class="candle">
        <div class="smoke" id="smoke"></div>
        <div class="flame" id="flame" role="button" tabindex="0" aria-label="Blow out the candle"></div>
        <div class="wax"><div class="wick"></div></div>
      </div>
      <p class="blow-hint" id="blowHint">tap the flame to blow it out</p>
      <button class="mic-btn" id="micBtn">…or actually blow into your mic</button>
      <p class="finale-line" id="finaleLine"></p>
    </div>

    <div class="section reveal" id="rvFriends">
      <p class="label-sm">From everyone who loves you</p>
      <button class="btn-gold friends-btn" id="friendsBtn">See what your friends said ✦</button>
      <p class="friends-count" id="friendsCount"></p>
    </div>

    <div class="divider reveal" id="rvDiv" aria-hidden="true"></div>
    <p class="signature reveal" id="rvSig"></p>
    <p class="meta reveal" id="rvMeta"></p>
  </section>
</main>

<!-- friends overlay -->
<div class="friends-overlay" id="friendsOverlay" aria-hidden="true" role="dialog" aria-label="Notes from your friends">
  <div class="fo-head">
    <span class="fo-title">What everyone said about you</span>
    <button class="fo-close" id="foClose" aria-label="Close">×</button>
  </div>
  <div class="fo-scroll" id="foScroll"></div>
</div>

<script>
const CARD = window.CARD || {};
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* star field */
(function(){
  const field=document.getElementById('starfield');
  const N=window.innerWidth<480?42:72;
  for(let i=0;i<N;i++){
    const s=document.createElement('span');s.className='twinkle';
    const size=Math.random()*2+0.6;
    s.style.width=size+'px';s.style.height=size+'px';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.setProperty('--dur',(Math.random()*3+2.5)+'s');
    s.style.setProperty('--delay',(Math.random()*4)+'s');
    field.appendChild(s);
  }
})();

/* content */
document.getElementById('rvGreeting').textContent = CARD.greeting || 'Happy Birthday,';
document.getElementById('rvName').textContent = CARD.herName || '';
document.getElementById('rvMessage').innerHTML = (CARD.message||[]).map(p=>`<p>${esc(p)}</p>`).join('');
document.getElementById('rvSig').textContent = CARD.signature || '';
document.getElementById('rvMeta').textContent = (CARD.meta||'') + (CARD.year||'');

/* reveal on scroll */
const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.18});
function watchReveals(){document.querySelectorAll('.reveal').forEach(el=>io.observe(el));}

/* open */
const sealed=document.getElementById('sealed');
const letter=document.getElementById('letter');
document.getElementById('openBtn').addEventListener('click',()=>{
  sealed.style.transition='opacity .6s ease, transform .6s ease';
  sealed.style.opacity='0';sealed.style.transform='translateY(-10px)';
  setTimeout(()=>{
    sealed.style.display='none';
    letter.classList.add('show');
    ['rvEyebrow','rvGreeting','rvName','rvConst'].forEach((id,k)=>{
      setTimeout(()=>document.getElementById(id).classList.add('in'), 250+k*220);
    });
    watchReveals(); buildNotes(); startMusic();
    document.getElementById('musicToggle').classList.add('show');
    window.scrollTo({top:0});
  },560);
});

/* memory stars */
const memPanel=document.getElementById('memoryPanel');
const memWhen=document.getElementById('memWhen');
const memWhat=document.getElementById('memWhat');
let activeStar=null;
function showMemory(i,el){
  const m=(CARD.memories||[])[i]; if(!m) return;
  document.querySelectorAll('.c-star').forEach(s=>s.classList.remove('active'));
  if(activeStar===i){ memPanel.classList.remove('open'); activeStar=null; return; }
  el.classList.add('active'); activeStar=i;
  memWhen.textContent=m.when; memWhat.textContent=m.what;
  memPanel.classList.add('open');
}
document.querySelectorAll('.c-star').forEach(el=>{
  const i=+el.dataset.i;
  el.addEventListener('click',()=>showMemory(i,el));
  el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();showMemory(i,el);}});
});

/* hourly notes */
function getAnchor(){
  if(CARD.unlock && CARD.unlock.mode==='fixed' && CARD.unlock.startISO){ return new Date(CARD.unlock.startISO).getTime(); }
  let t; try{ t=localStorage.getItem('card_anchor'); }catch(e){}
  if(!t){ t=Date.now(); try{localStorage.setItem('card_anchor',t);}catch(e){} }
  return +t;
}
function buildNotes(){
  const grid=document.getElementById('notesGrid'); grid.innerHTML='';
  const anchor=getAnchor();
  const step=((CARD.unlock&&CARD.unlock.intervalMinutes)||60)*60000;
  (CARD.hourlyNotes||[]).forEach((note,i)=>{
    const el=document.createElement('div');
    el.className='locket';
    el.dataset.unlock=anchor+i*step; el.dataset.note=note;
    el.innerHTML=`<span class="ic">✦</span><span class="cap"></span><span class="count"></span><span class="peek"></span>`;
    el.addEventListener('click',()=>{ if(Date.now()>=+el.dataset.unlock){ el.classList.add('opened'); el.querySelector('.peek').textContent=el.dataset.note; }});
    grid.appendChild(el);
  });
  tickNotes(); setInterval(tickNotes,1000);
}
function tickNotes(){
  document.querySelectorAll('.locket').forEach((el,i)=>{
    const ua=+el.dataset.unlock, now=Date.now();
    if(now>=ua){
      el.classList.remove('locked'); el.classList.add('unlocked');
      if(!el.classList.contains('opened')){ el.querySelector('.ic').textContent='✦'; el.querySelector('.cap').textContent=`note ${i+1}`; el.querySelector('.count').textContent='tap to open'; }
    }else{
      el.classList.add('locked'); el.classList.remove('unlocked');
      el.querySelector('.ic').textContent='✧'; el.querySelector('.cap').textContent=`note ${i+1}`; el.querySelector('.count').textContent=fmt(ua-now);
    }
  });
}
function fmt(ms){const s=Math.ceil(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60;if(h>0)return `${h}h ${m}m`;if(m>0)return `${m}m ${ss}s`;return `${ss}s`;}

/* candle + finale */
const flame=document.getElementById('flame');
const smoke=document.getElementById('smoke');
const blowHint=document.getElementById('blowHint');
let blownOut=false;
function blowOut(){
  if(blownOut) return; blownOut=true;
  flame.classList.add('out'); smoke.classList.add('go');
  blowHint.textContent='make a wish ✦';
  document.getElementById('micBtn').style.display='none';
  setTimeout(()=>{ celebrate();
    const f=document.getElementById('finaleLine');
    f.textContent='Happy birthday — here\u2019s to you. ✦';
    requestAnimationFrame(()=>f.classList.add('in'));
  },520);
}
flame.addEventListener('click',blowOut);
flame.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();blowOut();}});
document.getElementById('micBtn').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const src=ctx.createMediaStreamSource(stream); const an=ctx.createAnalyser(); an.fftSize=512; src.connect(an);
    const data=new Uint8Array(an.frequencyBinCount); let loud=0;
    blowHint.textContent='now blow… 🌬';
    const loop=()=>{
      if(blownOut){ stream.getTracks().forEach(t=>t.stop()); return; }
      an.getByteFrequencyData(data);
      let sum=0; for(let i=0;i<data.length;i++) sum+=data[i];
      const avg=sum/data.length;
      if(avg>42){ loud++; } else { loud=Math.max(0,loud-1); }
      if(loud>6){ blowOut(); stream.getTracks().forEach(t=>t.stop()); ctx.close(); return; }
      requestAnimationFrame(loop);
    }; loop();
  }catch(e){ blowHint.textContent='mic unavailable — just tap the flame'; }
});

/* confetti + fireworks */
const cv=document.getElementById('fx'); const cx=cv.getContext('2d');
function sizeCanvas(){cv.width=innerWidth;cv.height=innerHeight;} sizeCanvas(); addEventListener('resize',sizeCanvas);
const COLORS=['#f4a6c4','#ffd79a','#fdf4e3','#cbbce4','#f7c2d8','#ffe6b8'];
let parts=[]; let rafOn=false;
function celebrate(){
  if(reduceMotion) return;
  for(let i=0;i<140;i++){ parts.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.3,vx:(Math.random()-.5)*2,vy:2+Math.random()*3,g:0.05,s:4+Math.random()*5,rot:Math.random()*6,vr:(Math.random()-.5)*.3,c:COLORS[i%COLORS.length],life:1,type:'confetti'}); }
  [[.3,.35],[.7,.3],[.5,.5]].forEach(([fx,fy],k)=>{ setTimeout(()=>burst(cv.width*fx,cv.height*fy),k*350); });
  if(!rafOn){rafOn=true;requestAnimationFrame(drawFx);}
}
function burst(x,y){const n=42,col=COLORS[Math.floor(Math.random()*COLORS.length)];for(let i=0;i<n;i++){const a=(Math.PI*2*i)/n,sp=2+Math.random()*3.5;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:0.04,s:2.5+Math.random()*2,rot:0,vr:0,c:col,life:1,decay:0.012,type:'spark'});}}
function drawFx(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{ p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr; if(p.type==='spark'){p.life-=p.decay;p.vx*=0.98;p.vy*=0.98;}
    cx.globalAlpha=Math.max(0,p.life); cx.fillStyle=p.c;
    if(p.type==='confetti'){ cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);cx.restore(); }
    else{ cx.beginPath();cx.arc(p.x,p.y,p.s,0,7);cx.fill(); }
  });
  cx.globalAlpha=1; parts=parts.filter(p=>p.life>0 && p.y<cv.height+30);
  if(parts.length){requestAnimationFrame(drawFx);}else{rafOn=false;cx.clearRect(0,0,cv.width,cv.height);}
}

/* music (generative, original) */
let audioCtx=null, master=null, musicOn=true, ownAudio=null;
function startMusic(){
  if(!CARD.music || !CARD.music.enabled) return;
  if(CARD.music.ownTrackUrl){
    ownAudio=new Audio(CARD.music.ownTrackUrl); ownAudio.loop=true; ownAudio.volume=0;
    ownAudio.play().then(()=>fadeAudio(ownAudio,0.55,3000)).catch(()=>{}); return;
  }
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    master=audioCtx.createGain(); master.gain.value=0; master.connect(audioCtx.destination);
    fadeGain(master.gain,0.16,3);
    const pad=audioCtx.createGain(); pad.gain.value=0.5; pad.connect(master);
    const lp=audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900; lp.connect(pad);
    [220,330].forEach((f,i)=>{const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;
      const g=audioCtx.createGain();g.gain.value=0.18;o.connect(g);g.connect(lp);o.start();
      const lfo=audioCtx.createOscillator();lfo.frequency.value=0.07+i*0.03;const lg=audioCtx.createGain();lg.gain.value=0.06;lfo.connect(lg);lg.connect(g.gain);lfo.start();});
    const notes=[523.25,587.33,659.25,783.99,880.0,1046.5];
    const delay=audioCtx.createDelay(); delay.delayTime.value=0.36;
    const fb=audioCtx.createGain(); fb.gain.value=0.32; delay.connect(fb); fb.connect(delay); delay.connect(master);
    let step=0;
    setInterval(()=>{ if(!musicOn||!audioCtx) return;
      const f=notes[(step*2+(Math.random()<.3?1:0))%notes.length]; step++;
      const o=audioCtx.createOscillator(); o.type='triangle'; o.frequency.value=f;
      const g=audioCtx.createGain(); g.gain.value=0; o.connect(g); g.connect(master); g.connect(delay);
      const t=audioCtx.currentTime;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.12,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+1.4);
      o.start(t); o.stop(t+1.5);
    },1600);
  }catch(e){}
}
function fadeGain(param,to,sec){const t=audioCtx.currentTime;param.cancelScheduledValues(t);param.setValueAtTime(param.value,t);param.linearRampToValueAtTime(to,t+sec);}
function fadeAudio(a,to,ms){const start=a.volume,t0=performance.now();(function tick(now){const k=Math.min(1,(now-t0)/ms);a.volume=start+(to-start)*k;if(k<1)requestAnimationFrame(tick);})(t0);}
document.getElementById('musicToggle').addEventListener('click',()=>{
  musicOn=!musicOn; const btn=document.getElementById('musicToggle');
  btn.textContent=musicOn?'♪':'♪̶';
  if(master) fadeGain(master.gain, musicOn?0.16:0, 0.6);
  if(ownAudio) fadeAudio(ownAudio, musicOn?0.55:0, 600);
  btn.style.opacity=musicOn?'1':'.5';
});

/* ───────── friends notes (Firebase) + floating reveal ───────── */
let friendsData=[]; let friendsBackend=null;
const friendsCountEl=document.getElementById('friendsCount');
const foScroll=document.getElementById('foScroll');
const overlay=document.getElementById('friendsOverlay');

async function initFriends(){
  if(CARD.firebase){
    try{
      const a=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const fs=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
      const app=a.initializeApp(CARD.firebase); const db=fs.getFirestore(app);
      friendsBackend={mode:'firebase'};
      const q=fs.query(fs.collection(db,'guestbook'), fs.orderBy('ts','desc'));
      fs.onSnapshot(q,(snap)=>{ friendsData=[]; snap.forEach(d=>friendsData.push(d.data())); updateFriendsCount(); if(overlay.classList.contains('show')) renderFloat(); });
      return;
    }catch(e){ console.warn('friends/firebase',e); }
  }
  friendsBackend={mode:'local'};
  try{ friendsData=JSON.parse(localStorage.getItem('card_guestbook')||'[]'); }catch(e){ friendsData=[]; }
  updateFriendsCount();
}
function updateFriendsCount(){
  const n=friendsData.length;
  friendsCountEl.textContent = n ? `${n} ${n===1?'note is':'notes are'} waiting for you ✦` : 'their notes will appear here ✦';
}
function renderFloat(){
  if(!friendsData.length){ foScroll.innerHTML='<div class="fo-empty">No notes just yet — they\u2019re on their way ✦</div>'; return; }
  foScroll.innerHTML = friendsData.map((it,i)=>{
    const r=(Math.random()*2-1).toFixed(2);
    const bd=(5+Math.random()*4).toFixed(2);
    const delay=(i*0.08).toFixed(2);
    return `<div class="float-note" style="--r:${r}deg;--bd:${bd}s;--delay:${delay}s">
      <div class="fn-from">${esc(it.name||'A friend')}</div>
      <div class="fn-msg">${esc(it.msg||'')}</div></div>`;
  }).join('');
}
function openFriends(){ overlay.classList.add('show'); overlay.setAttribute('aria-hidden','false'); renderFloat(); }
function closeFriends(){ overlay.classList.remove('show'); overlay.setAttribute('aria-hidden','true'); }
document.getElementById('friendsBtn').addEventListener('click',openFriends);
document.getElementById('foClose').addEventListener('click',closeFriends);
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeFriends(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && overlay.classList.contains('show')) closeFriends(); });
initFriends();
</script>
